<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="mobile.css">
  <meta name="description" content="Your App Name helps users manage tasks quickly and efficiently. Fast, secure, and available on any device.">
<meta name="keywords" content="your app, productivity, web app, online tool, task manager, dashboard">
<meta name="author" content="Your Company Name">
<meta name="robots" content="index, follow">
<meta name="language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Canonical URL -->
<link rel="canonical" href="https://yourdomain.com/">

<!-- Open Graph (Facebook, LinkedIn) -->
<meta property="og:type" content="website">
<meta property="og:title" content="Your App Name">
<meta property="og:description" content="The easiest way to manage your work and stay productive.">
<meta property="og:image" content="https://yourdomain.com/images/preview.jpg">
<meta property="og:url" content="https://yourdomain.com/">
<meta property="og:site_name" content="Your App Name">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Your App Name">
<meta name="twitter:description" content="The easiest way to manage your work and stay productive.">
<meta name="twitter:image" content="https://yourdomain.com/images/preview.jpg">

<!-- Theme Color -->
<meta name="theme-color" content="#2563eb">

<!-- Favicon -->
<link rel="icon" href="/favicon.ico">

<!-- Structured Data (JSON-LD) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Your App Name",
  "url": "https://yourdomain.com",
  "description": "A modern web application that helps users stay productive.",
  "applicationCategory": "BusinessApplication",
  "operatingSystem": "All",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  }
}
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

#splash {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #00bf63;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    transition: opacity 0.5s ease;
}

.header {
  padding: 10px 16px;
  background: #555;
  color: #f1f1f1;
}

#myHeader {
  padding: 10px 16px;
  background: #00bf63;
  color: #f1f1f1;
}

.content {
  padding: 16px;
}

.sticky {
  position: fixed;
  top: 0;
  width: 100%;
}

.sticky + .content {
  padding-top: 102px;
  

/* Extra small devices (phones, 600px and down) */
@media only screen and (max-width: 600px) {
  .example {background: red;}
}

/* Small devices (portrait tablets and large phones, 600px and up) */
@media only screen and (min-width: 600px) {
  .example {background: green;}
}

/* Medium devices (landscape tablets, 768px and up) */
@media only screen and (min-width: 768px) {
  .example {background: blue;}
} 

/* Large devices (laptops/desktops, 992px and up) */
@media only screen and (min-width: 992px) {
  .example {background: orange;}
} 

/* Extra large devices (large laptops and desktops, 1200px and up) */
@media only screen and (min-width: 1200px) {
  .example {background: pink;}
}
</style>
</head>
<body>

<div id="splash">
    My App
</div>

<div id="content">
<div class="header" id="myHeader">
  <h2>My App</h2>
</div>

<div class="content">
  <h3>Code goes here....</h3>

</div>

<script>
setTimeout(() => {
    document.getElementById("splash").style.opacity = "0";

    setTimeout(() => {
        document.getElementById("splash").style.display = "none";
        document.getElementById("content").style.display = "block";
    }, 500);
}, 2000);

window.onscroll = function() {myFunction()};

var header = document.getElementById("myHeader");
var sticky = header.offsetTop;

function myFunction() {
  if (window.pageYOffset > sticky) {
    header.classList.add("sticky");
  } else {
    header.classList.remove("sticky");
  }
}
</script>

</body>
</html>
